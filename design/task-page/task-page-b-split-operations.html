<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BSL 任务中心设计稿 B - 分栏运维</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111417;
      --panel: rgba(27, 31, 37, .86);
      --line: rgba(255, 255, 255, .08);
      --text: #f5f7fa;
      --muted: #a9b1bc;
      --accent: #8bc6ff;
      --ok: #77dca7;
      --bad: #ff8585;
    }

    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif; background: var(--bg); color: var(--text); }

    main {
      width: min(1200px, calc(100vw - 64px));
      margin: 40px auto;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr) 260px;
      gap: 16px;
    }

    .panel {
      min-height: 120px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }

    h1 { grid-column: 1 / -1; margin: 0 0 4px; font-size: 28px; letter-spacing: 0; }
    h2 { margin: 0; font-size: 14px; color: var(--muted); font-weight: 500; }

    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 42px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    .source {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 8px;
    }

    .source:last-child { border-bottom: 0; }
    .source b { font-size: 15px; }
    .source span { color: var(--muted); font-size: 13px; }

    .queue-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 132px 108px;
      gap: 16px;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .queue-row:last-child { border-bottom: 0; }
    .title { font-weight: 650; }
    .meta { margin-top: 4px; color: var(--muted); font-size: 13px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

    .progress { height: 6px; border-radius: 999px; background: rgba(255,255,255,.12); overflow: hidden; }
    .progress div { height: 100%; width: var(--p); background: var(--accent); }
    .state { color: var(--muted); font-size: 13px; }
    .state.ok { color: var(--ok); }
    .state.bad { color: var(--bad); }

    .buttons { display: flex; gap: 8px; justify-content: flex-end; }
    button { width: 32px; height: 32px; border: 1px solid var(--line); border-radius: 8px; background: rgba(255,255,255,.05); color: var(--text); }
    button:disabled { opacity: .34; }

    .issue { padding: 14px; border-bottom: 1px solid var(--line); }
    .issue:last-child { border-bottom: 0; }
  </style>
</head>
<body>
  <main>
    <div>
      <h1>下载中心</h1>
      <h2>按来源、队列和问题分栏。</h2>
    </div>
    <section class="panel" style="grid-column: 1;">
      <div class="head">来源</div>
      <div class="source"><b>Starward 原生任务</b><span>原神、星穹铁道、绝区零</span></div>
      <div class="source"><b>BSL 自建队列</b><span>鸣潮、明日方舟、终末地</span></div>
    </section>

    <section class="panel" style="grid-column: 2;">
      <div class="head"><span>队列</span><span>1 / 3</span></div>
      <article class="queue-row">
        <div><div class="title">鸣潮</div><div class="meta">安装 / 下载中 / D:\Games\Wuthering Waves</div></div>
        <div><div class="progress"><div style="--p:64%"></div></div><div class="meta">64%</div></div>
        <div class="buttons"><button title="暂停">⏸</button><button title="取消">✕</button></div>
      </article>
      <article class="queue-row">
        <div><div class="title">原神</div><div class="meta">Starward 原生更新 / 排队中</div></div>
        <div><div class="progress"><div style="--p:0%"></div></div><div class="meta">0%</div></div>
        <div class="buttons"><button title="继续" disabled>▶</button><button title="停止">■</button></div>
      </article>
      <article class="queue-row">
        <div><div class="title">明日方舟</div><div class="meta">修复 / 已暂停</div></div>
        <div><div class="progress"><div style="--p:18%"></div></div><div class="meta">18%</div></div>
        <div class="buttons"><button title="继续">▶</button><button title="取消">✕</button></div>
      </article>
    </section>

    <section class="panel" style="grid-column: 3;">
      <div class="head">需要处理</div>
      <div class="issue"><div class="title">残留缓存</div><div class="meta">鸣潮预下载缓存可清理</div></div>
      <div class="issue"><div class="title">失败任务</div><div class="meta">明日方舟修复可重试</div></div>
    </section>
  </main>
</body>
</html>
